name: fitsmart
description: AI-Powered Fitness & Meal Planner
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1

  # AI
  google_generative_ai: ^0.4.6

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Charts
  fl_chart: ^0.69.2

  # UI
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true